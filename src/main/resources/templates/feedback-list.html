<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - SkillShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="container-custom section-spacing">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="fas fa-comments me-2 text-primary"></i>
                Community Feedback
            </h2>
            <a href="/" class="btn btn-custom-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </a>
        </div>

        <div th:if="${#lists.isEmpty(feedbacks)}" class="empty-state">
            <i class="fas fa-comments"></i>
            <h3>No feedback yet</h3>
            <p>Feedback from completed sessions will appear here.</p>
        </div>

        <div th:if="${!#lists.isEmpty(feedbacks)}" class="row g-4">
            <div th:each="f : ${feedbacks}" class="col-lg-6">
                <div class="card-custom">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <h5 class="mb-1">
                                    <i class="fas fa-hashtag text-primary me-1"></i>
                                    Session #<span th:text="${f.session.sessionId}"></span>
                                </h5>
                                <small class="text-secondary">
                                    <i class="fas fa-lightbulb me-1"></i>
                                    <span th:text="${f.session.skill.name}"></span>
                                </small>
                            </div>
                            <div class="stars">
                                <i th:each="star : ${#numbers.sequence(1, 5)}"
                                   th:class="'fa-solid fa-star'"
                                   th:classappend="${star <= f.rating} ? '' : 'text-muted'"></i>
                                <span class="ms-1 fw-semibold" th:text="${f.rating}"></span>
                            </div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-sm-6">
                                <div class="bg-light rounded p-2">
                                    <small class="text-secondary d-block">MENTOR</small>
                                    <span class="fw-semibold" th:text="${f.ratee.firstName + ' ' + f.ratee.lastName}"></span>
                                </div>
                            </div>
                            <div class="col-sm-6">
                                <div class="bg-light rounded p-2">
                                    <small class="text-secondary d-block">MENTEE</small>
                                    <span class="fw-semibold" th:text="${f.reviewer.firstName + ' ' + f.reviewer.lastName}"></span>
                                </div>
                            </div>
                        </div>

                        <div class="feedback-comment">
                            <h6 class="text-primary mb-2">
                                <i class="fas fa-quote-left me-1"></i>
                                Feedback
                            </h6>
                            <p class="mb-0 text-secondary" th:text="${f.comment}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
