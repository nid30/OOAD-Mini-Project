<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Sent - SkillShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="container-custom section-spacing">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card-custom text-center">
                    <div class="card-body py-5">
                        <div class="success-icon mb-4">
                            <i class="fas fa-check-circle text-success" style="font-size: 4rem;"></i>
                        </div>
                        <h2 class="text-success mb-3">Notification Sent!</h2>
                        <p class="text-secondary mb-4">
                            Your notification has been successfully sent to the student.
                            Check the database for the notification entry.
                        </p>
                        <div class="d-flex gap-3 justify-content-center">
                            <a href="/" class="btn btn-custom-primary">
                                <i class="fas fa-home me-2"></i>Back to Home
                            </a>
                            <a href="/search" class="btn btn-custom-secondary">
                                <i class="fas fa-search me-2"></i>Search Students
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
