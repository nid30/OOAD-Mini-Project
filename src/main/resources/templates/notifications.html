<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Notifications - SkillShare</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>

<body>

<div th:replace="~{navbar :: navbar}"></div>

<div class="container-custom section-spacing">

    <h2 class="mb-4">
        🔔 Notifications
    </h2>

    <!-- EMPTY STATE -->
    <div th:if="${#lists.isEmpty(notifications)}" class="text-center text-muted mt-5">
        <h4>No notifications yet</h4>
        <p>When you receive updates, they will appear here.</p>
    </div>

    <!-- NOTIFICATIONS LIST -->
    <div th:if="${!#lists.isEmpty(notifications)}">

        <div th:each="n : ${notifications}" 
        th:class="'card-custom mb-3 ' + (${n.status.name() == 'UNREAD'} ? 'border border-primary' : '')">

            <div class="card-body">

                <div class="d-flex justify-content-between align-items-center">

                    <!-- MESSAGE -->
                    <div>
                        <span th:text="${n.message}"></span>
                    </div>

                    <!-- TIME -->
                    <small class="text-muted"
                           th:text="${#temporals.format(n.timestamp, 'dd MMM yyyy HH:mm')}">
                    </small>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
