<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Mentors - SkillShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="container-custom section-spacing">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Search Results</h2>
            <a href="/" class="btn btn-custom-secondary">
                <i class="fas fa-arrow-left me-2"></i>Back to Home
            </a>
        </div>

        <!-- Search Form -->
        <div class="card-custom mb-4">
            <form method="get" action="/search" class="d-flex gap-2">
                <input type="text" name="query" class="form-control" placeholder="Search mentors by name..." th:value="${query}">
                <button type="submit" class="btn btn-custom-primary">
                    <i class="fas fa-search"></i>
                </button>
            </form>
        </div>

        <!-- Results -->
        <div th:if="${#lists.isEmpty(mentors)}" class="empty-state">
            <i class="fas fa-search"></i>
            <h3 th:if="${query != null and query != ''}">No mentors found for "<span th:text="${query}"></span>"</h3>
            <h3 th:if="${query == null or query == ''}">No mentors available</h3>
            <p>Try searching for a different name or browse all mentors.</p>
        </div>

        <div th:if="${!#lists.isEmpty(mentors)}" class="row g-3">
            <div th:each="mentor : ${mentors}" class="col-lg-3 col-md-4 col-sm-6">
                <div class="card-custom mentor-card">
                    <div class="mentor-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <h5 th:text="${mentor.firstName + ' ' + mentor.lastName}"></h5>
                    <div class="rating mb-1">
                        <div class="stars">
                            <i th:each="star : ${#numbers.sequence(1, 5)}"
                               th:class="'fa-solid fa-star'"
                               th:classappend="${star <= mentor.avgRating} ? '' : 'text-muted'"></i>
                            <span class="ms-1 fw-semibold small" th:text="'(' + ${mentor.avgRating} + ')'"></span>
                        </div>
                    </div>
                    <div class="text-secondary small" th:text="${mentor.department}"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
