<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessions - SkillShare</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/custom.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{navbar :: navbar}"></div>

    <div class="container-custom section-spacing">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Mentorship Sessions</h2>
            <a href="/" class="btn btn-custom-secondary">
                Back to Home
            </a>
        </div>

        <div th:if="${sessionUser.role == 'STUDENT'}">
            <div class="card-custom mb-5">
                <div class="card-body">
                    <h3 class="mb-4">Schedule New Session</h3>

                    <form action="/sessions/create" method="post">
                        <div class="row g-3">

                            <div class="col-md-6">
                                <label>Select Mentor</label>
                                <select name="mentorId" class="form-control-custom" required>
                                    <option value="">Choose Mentor</option>
                                    <option th:each="m : ${mentors}"
                                            th:value="${m.studentId}"
                                            th:text="${m.firstName + ' ' + m.lastName}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label>Select Skill</label>
                                <select name="skillId" class="form-control-custom" required>
                                    <option value="">Choose Skill</option>
                                    <option th:each="s : ${skills}"
                                            th:value="${s.skillId}"
                                            th:text="${s.name}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label>Schedule Time</label>
                                <input type="datetime-local" name="time" class="form-control-custom" required>
                            </div>

                            <input type="hidden" name="menteeId"
                                   th:value="${sessionUser.studentId}" />

                            <div class="col-12">
                                <button type="submit" class="btn btn-custom-primary">
                                    Create Session Request
                                </button>
                            </div>

                        </div>
                    </form>
                </div>
            </div>
        </div>

        <h3 class="mb-4">All Sessions</h3>

        <div th:if="${#lists.isEmpty(sessions)}">
            <h4>No sessions yet</h4>
        </div>

        <div th:if="${!#lists.isEmpty(sessions)}" class="row g-4">
            <div th:each="s : ${sessions}" class="col-12">
                <div class="card-custom">
                    <div class="card-body">

                        <h5>
                            Session #<span th:text="${s.sessionId}"></span>
                        </h5>

                        <p>
                            Mentor: <span th:text="${s.mentor.firstName}"></span><br>
                            Mentee: <span th:text="${s.mentee.firstName}"></span><br>
                            Skill: <span th:text="${s.skill.name}"></span><br>
                        </p>

                        <div class="d-flex gap-2 flex-wrap">

                            <!-- ACCEPT / REJECT -->
                            <div th:if="${s.status.name() == 'PENDING' 
                                        and s.mentor.studentId == sessionUser.studentId}">

                                <form action="/sessions/respond" method="post">
                                    <input type="hidden" name="sessionId" th:value="${s.sessionId}" />

                                    <button name="status" value="ACCEPTED"
                                            class="btn btn-success btn-sm">
                                        Accept
                                    </button>

                                    <button name="status" value="REJECTED"
                                            class="btn btn-danger btn-sm">
                                        Reject
                                    </button>
                                </form>

                            </div>

                            <!-- COMPLETE -->
                            <form th:if="${s.status.name() == 'ACCEPTED' 
                                        and s.mentor.studentId == sessionUser.studentId}"
                                  th:action="@{'/sessions/complete/' + ${s.sessionId}}"
                                  method="post">

                                <button class="btn btn-primary btn-sm">
                                    Complete
                                </button>
                            </form>

                            <!-- FEEDBACK BUTTON -->
                            <a th:if="${s.status.name() == 'COMPLETED' 
                                        and s.mentee.studentId == sessionUser.studentId 
                                        and !feedbackMap[s.sessionId]}"
                               th:href="@{/feedback(sessionId=${s.sessionId})}"
                               class="btn btn-secondary btn-sm">

                                Give Feedback
                            </a>

                            <!-- DONE -->
                            <span th:if="${feedbackMap[s.sessionId]}" class="text-success">
                                Done
                            </span>

                            <!-- REJECTED -->
                            <span th:if="${s.status.name() == 'REJECTED'}" class="text-danger">
                                Rejected
                            </span>

                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
